<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shattered Realms">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000005">
  <meta name="application-name" content="Shattered Realms">
  <meta name="description" content="Un roguelite brick-breaker narratif">

  <!-- Icons (générés dynamiquement) -->
  <link rel="apple-touch-icon" id="apple-icon" href="">
  <link rel="icon" id="favicon" type="image/png" href="">
  <link rel="manifest" href="manifest.json">

  <title>SHATTERED REALMS</title>
  <link rel="stylesheet" href="style.css">

  <!-- Génération dynamique des icônes -->
  <script>
    function generateIcon(size) {
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const cx = size / 2, cy = size / 2;

      const bg = ctx.createLinearGradient(0, 0, size, size);
      bg.addColorStop(0, '#000510');
      bg.addColorStop(1, '#020a1a');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = 'rgba(0,229,255,0.07)';
      ctx.lineWidth = 1;
      for (let i = size / 5; i < size; i += size / 5) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, size); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(size, i); ctx.stroke();
      }

      const halo = ctx.createRadialGradient(cx, cy, size * 0.1, cx, cy, size * 0.5);
      halo.addColorStop(0, 'rgba(0,229,255,0.18)');
      halo.addColorStop(1, 'rgba(0,229,255,0)');
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, size, size);

      const s = size * 0.3;
      ctx.beginPath();
      ctx.moveTo(cx, cy - s);
      ctx.lineTo(cx + s * 0.75, cy);
      ctx.lineTo(cx, cy + s);
      ctx.lineTo(cx - s * 0.75, cy);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,229,255,0.12)';
      ctx.fill();
      ctx.strokeStyle = '#00e5ff';
      ctx.lineWidth = Math.max(1.5, size * 0.015);
      ctx.stroke();

      const si = s * 0.55;
      ctx.beginPath();
      ctx.moveTo(cx, cy - si);
      ctx.lineTo(cx + si * 0.75, cy);
      ctx.lineTo(cx, cy + si);
      ctx.lineTo(cx - si * 0.75, cy);
      ctx.closePath();
      const fill = ctx.createLinearGradient(cx, cy - si, cx, cy + si);
      fill.addColorStop(0, '#88ffff');
      fill.addColorStop(0.4, '#00e5ff');
      fill.addColorStop(1, '#0066aa');
      ctx.fillStyle = fill;
      ctx.fill();

      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.moveTo(cx, cy - si);
      ctx.lineTo(cx + si * 0.3, cy - si * 0.3);
      ctx.lineTo(cx, cy - si * 0.1);
      ctx.lineTo(cx - si * 0.3, cy - si * 0.3);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = 'rgba(0,229,255,0.4)';
      ctx.font = `bold ${Math.round(size * 0.13)}px "Courier New", monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SR', cx, cy + s * 1.45);

      return c.toDataURL('image/png');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const icon = generateIcon(180);
      document.getElementById('apple-icon').href = icon;
      document.getElementById('favicon').href = generateIcon(32);
    });
  </script>
</head>
<body>
  <div id="game-wrapper">
    <div id="game-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="src/data/narrative.js"></script>
  <script src="src/data/upgrades.js"></script>
  <script src="src/data/levels.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/NarrativeScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/UpgradeScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/scenes/VictoryScene.js"></script>
  <script src="src/main.js"></script>

  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(() => {});
      });
    }
  </script>
</body>
</html>
